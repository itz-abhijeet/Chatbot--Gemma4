<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #e2e8f0;
            --accent-color: #8b5cf6;
            --accent-hover: #7c3aed;
            --glass-bg: rgba(25, 25, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --user-msg: rgba(139, 92, 246, 0.2);
            --bot-msg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #001e3c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
            margin: 0 10px;
        }

        @media (max-width: 600px) {
            #app-wrapper {
                height: 100vh;
                border-radius: 0;
                margin: 0;
                border: none;
            }
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
            font-size: 1.4rem;
            color: #fff;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            letter-spacing: 1px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar for chat */
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 20px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: var(--user-msg);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-bottom-right-radius: 4px;
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-msg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(5px);
        }

        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .upload-btn {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .upload-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        #imagePreviewContainer {
            position: relative;
            display: none;
            margin-bottom: 5px;
        }

        #imagePreview {
            height: 60px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #removeImageBtn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        #removeImageBtn:hover {
            transform: scale(1.1);
        }
        
        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px;
            transition: border-color 0.3s;
        }
        
        .input-wrapper:focus-within {
            border-color: rgba(139, 92, 246, 0.6);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 8px 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            resize: none;
            max-height: 150px;
            min-height: 24px;
            line-height: 1.5;
            overflow-y: auto;
        }
        
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Custom Scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 4px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        button#sendBtn {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border: none;
            height: 45px;
            padding: 0 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        button#sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        button#sendBtn:disabled {
            background: rgba(255,255,255,0.1);
            box-shadow: none;
            color: rgba(255,255,255,0.4);
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-left: 25px;
            margin-bottom: 15px;
            display: none;
            display: flex; /* overridden by JS */
            align-items: center;
            gap: 8px;
        }

        /* Loader Animation */
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .message img {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
    </style>
</head>

<body>
    
    <div id="app-wrapper">
        <header>✨ Gemma 4 Local ✨</header>

        <div id="chat-container">
            <div class="message bot">Hello! I am Gemma 4. How can I help you today?</div>
        </div>

        <div class="typing" id="status" style="display: none;">
            Gemma is thinking
            <div class="typing-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="input-area">
            <label for="imageUpload" class="upload-btn" title="Upload Image">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            
            <div class="input-wrapper">
                <div id="imagePreviewContainer">
                    <img id="imagePreview" src="" alt="preview">
                    <button id="removeImageBtn">✖</button>
                </div>
                <textarea id="userInput" placeholder="Type your message... (Shift+Enter for new line)" rows="1"></textarea>
            </div>
            
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const API_URL = "https://vintage-trusting-happier.ngrok-free.dev/api/generate";
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        let currentImageBase64 = null;
        const imageUpload = document.getElementById('imageUpload');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removeImageBtn = document.getElementById('removeImageBtn');

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto'; // Reset height
            this.style.height = (this.scrollHeight) + 'px'; // Set to actual scroll height
        });

        // Handle Enter key for submit, Shift+Enter for newline
        userInput.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Prevent default new line
                sendMessage(); 
            }
        });

        imageUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageBase64 = e.target.result.split(',')[1];
                    imagePreview.src = e.target.result;
                    imagePreviewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        removeImageBtn.addEventListener('click', function() {
            currentImageBase64 = null;
            imageUpload.value = '';
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
            // Return focus to input
            userInput.focus();
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !currentImageBase64) return;

            const base64ImageToSend = currentImageBase64;
            const previewUrl = imagePreview.src;

            // Add user message to UI
            appendMessage(text, 'user', base64ImageToSend ? previewUrl : null);
            
            // Clear input fields and reset UI
            userInput.value = '';
            userInput.style.height = 'auto'; // reset textarea
            
            currentImageBase64 = null;
            imageUpload.value = '';
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
            userInput.focus(); 

            toggleLoading(true);

            const payload = {
                model: "gemma4:e4b",
                prompt: text,
                stream: false
            };

            if (base64ImageToSend) {
                payload.images = [base64ImageToSend];
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                appendMessage(data.response, 'bot');
            } catch (error) {
                appendMessage("Error: Could not connect to the model. Check if Colab is still running.", 'bot');
                console.error(error);
            } finally {
                toggleLoading(false);
            }
        }

        function appendMessage(text, sender, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }
            
            if (text) {
                const textDiv = document.createElement('div');
                // Preserve whitespace formatting from textarea
                textDiv.style.whiteSpace = 'pre-wrap';
                textDiv.innerText = text;
                msgDiv.appendChild(textDiv);
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function toggleLoading(isLoading) {
            sendBtn.disabled = isLoading;
            status.style.display = isLoading ? 'flex' : 'none';
        }

        sendBtn.addEventListener('click', sendMessage);
    </script>
</body>

</html>
