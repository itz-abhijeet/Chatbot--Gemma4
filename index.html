<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incognito Gemma</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Abstract animated raining glass background -->
    <div class="bg-bokeh"></div>
    <div class="bg-noise"></div>

    <div id="app-wrapper">
        <header>
            <h1>Incognito Gemma</h1>
        </header>

        <div id="chat-container">
            <div class="message bot">Hello! I am Incognito Gemma. How can I help you today?</div>
        </div>

        <div class="typing" id="status" style="display: none;">
            Gemma is thinking
            <div class="typing-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="input-area">
            <label for="imageUpload" class="upload-btn" title="Upload Image">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">

            <div class="input-wrapper">
                <div id="imagePreviewContainer">
                    <img id="imagePreview" src="" alt="preview">
                    <button id="removeImageBtn">✖</button>
                </div>
                <textarea id="userInput" placeholder="Type your message... (Shift+Enter for new line)"
                    rows="1"></textarea>
            </div>

            <button id="sendBtn">Send</button>
        </div>
    </div>

    <footer>
        by <span>Astonishing Geeks</span>
    </footer>

    <!-- Markdown library for parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
